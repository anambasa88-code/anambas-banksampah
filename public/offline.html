<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tidak Ada Sinyal — Bank Sampah Anambas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #f0fdf4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #16a34a; font-size: 20px; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #16a34a;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }
    button:active { background: #15803d; }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Tidak Ada Sinyal</h1>
    <p>
      Koneksi internet terputus.<br/>
      Data terakhir masih tersimpan.<br/>
      Coba lagi saat sinyal kembali.
    </p>
    <button onclick="window.location.reload()">
      Coba Lagi
    </button>
    <div class="status" id="status">Menunggu koneksi...</div>
  </div>

  <script>
    // Auto reload saat sinyal kembali
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = '✅ Sinyal kembali! Memuat ulang...'
      setTimeout(() => window.location.reload(), 1000)
    })
  </script>
</body>
</html>
